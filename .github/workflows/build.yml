name: Build & Test

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore DotNetTraining.sln

      - name: Build
        run: dotnet build DotNetTraining.sln --no-restore --configuration Release

      - name: Check formatting
        run: dotnet format DotNetTraining.sln --verify-no-changes

      - name: Test
        run: dotnet test DotNetTraining.sln --no-build --configuration Release --logger "trx;LogFileName=results.trx" --results-directory ./TestResults

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: ./TestResults/*.trx
